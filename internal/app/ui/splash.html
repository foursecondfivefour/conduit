<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Conduit</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: radial-gradient(120% 100% at 50% 0%, #1a2744 0%, #0d1117 55%, #080b10 100%);
      color: #e8edf7;
      user-select: none;
    }
    .wrap {
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      padding: 28px;
    }
    .logo {
      width: 96px;
      height: 96px;
      border-radius: 22px;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.45);
      animation: pulse 2.2s ease-in-out infinite;
    }
    h1 {
      font-size: 1.55rem;
      font-weight: 600;
      letter-spacing: 0.04em;
    }
    .tagline {
      font-size: 0.92rem;
      color: #9db0d0;
      text-align: center;
      max-width: 280px;
      line-height: 1.45;
    }
    .bar {
      width: min(240px, 80vw);
      height: 4px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      overflow: hidden;
      margin-top: 8px;
    }
    .bar > span {
      display: block;
      height: 100%;
      width: 35%;
      border-radius: inherit;
      background: linear-gradient(90deg, #2dd4ff, #8b5cf6);
      animation: slide 1.4s ease-in-out infinite;
    }
    .status {
      font-size: 0.8rem;
      color: #7f93b8;
      letter-spacing: 0.02em;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.04); }
    }
    @keyframes slide {
      0% { transform: translateX(-120%); }
      100% { transform: translateX(320%); }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <img class="logo" src="data:image/png;base64,{{ICON}}" alt="Conduit">
    <h1>Conduit</h1>
    <p class="tagline">{{I18N_SPLASH_TAGLINE}}</p>
    <div class="bar" aria-hidden="true"><span></span></div>
    <p class="status">{{I18N_SPLASH_STATUS}}</p>
  </div>
</body>
</html>
