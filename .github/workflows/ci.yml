name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Install go-winres
        run: go install github.com/tc-hib/go-winres@latest

      - name: Embed Windows icon
        run: go generate ./...

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build -ldflags="-s -w" -tags production -o build/conduit.exe .
