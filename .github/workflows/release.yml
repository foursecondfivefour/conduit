name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Resolve version from tag
        id: ver
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          if [ -z "$TAG" ] || [ "$TAG" = "$GITHUB_REF_NAME" ]; then TAG="1.2.0"; fi
          echo "version=$TAG" >> "$GITHUB_OUTPUT"

      - name: Install go-winres
        run: go install github.com/tc-hib/go-winres@latest

      - name: Embed Windows icon
        run: go generate ./...

      - name: Build conduit
        run: |
          go build -ldflags="-s -w -H=windowsgui -X github.com/foursecondfivefour/conduit/internal/config.Version=${{ steps.ver.outputs.version }}" -tags production -o build/conduit.exe .

      - name: Build updater
        run: go build -ldflags="-s -w -H=windowsgui" -o build/conduit-updater.exe ./cmd/conduit-updater

      - name: SHA256 checksum
        run: |
          certutil -hashfile build\conduit.exe SHA256 | findstr /v "hash" | findstr /v "CertUtil" > build\conduit.exe.sha256

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build installer
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path build | Out-Null
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" "installer\conduit.iss"

      # Optional code signing (requires WINDOWS_CERT_BASE64 secret)
      # - name: Sign binaries
      #   if: ${{ secrets.WINDOWS_CERT_BASE64 != '' }}
      #   run: echo "Add signtool steps here — see docs/CODE_SIGNING.md"

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            build/conduit.exe
            build/conduit-updater.exe
            build/conduit.exe.sha256
            build/Conduit-Setup-*.exe
          body_path: CHANGELOG.md
          draft: false
