name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Install go-winres
        run: go install github.com/tc-hib/go-winres@latest

      - name: Embed Windows icon
        run: go generate ./...

      - name: Build
        run: go build -ldflags="-s -w -H=windowsgui" -tags production -o conduit.exe .

      - uses: softprops/action-gh-release@v2
        with:
          files: conduit.exe
          generate_release_notes: true
