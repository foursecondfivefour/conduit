name: Bug report
description: Report a problem with Conduit on Windows
title: "[Bug]: "
labels: ["bug"]
body:
  - type: input
    id: version
    attributes:
      label: Conduit version
      placeholder: "1.2.0"
    validations:
      required: true
  - type: dropdown
    id: windows
    attributes:
      label: Windows version
      options:
        - Windows 11
        - Windows 10
        - Other
  - type: input
    id: strategy
    attributes:
      label: DPI strategy
      placeholder: tcp_segmentation
  - type: input
    id: doh
    attributes:
      label: DoH provider
      placeholder: cloudflare
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
  - type: textarea
    id: logs
    attributes:
      label: Log excerpt
      description: From `%AppData%\Conduit\logs\conduit.log` or portable `./Conduit/logs/`
